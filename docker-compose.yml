services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog_app
    volumes:
      - .:/var/www
    working_dir: /var/www
    environment:
      REDIS_HOST: redis
      DB_PORT: "3306"
    depends_on:
      - mysql
      - redis
    networks:
      - blog_net
    mem_limit: 512m
    cpus: "1.0"
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: my_db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-root}"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - blog_net
    mem_limit: 1024m
    cpus: "0.8"

  blog_web_server:
    image: nginx:latest
    container_name: blog_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - blog_net
    mem_limit: 200m
    cpus: "0.5"
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - blog_net
    mem_limit: 256m
    cpus: "0.5"

volumes:
  db-data:

networks:
  blog_net:
    driver: bridge
